<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushanta Roy | Advocate</title>

<style>
body { margin:0; font-family: Arial; }

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#fff;
  border-bottom:3px solid #a82323;
}
.logo { font-weight:bold; color:#a82323; }

.menu {
  display:flex;
  gap:20px;
}
.menu a { text-decoration:none; font-weight:bold; color:#1a2a6c; }

.toggle {
  display:none;
  font-size:24px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .menu {
    display:none;
    flex-direction:column;
    position:absolute;
    top:60px;
    right:0;
    background:#fff;
    width:200px;
    padding:20px;
  }
  .menu.active { display:flex; }
  .toggle { display:block; }
}

/* HERO */
.hero {
  background:linear-gradient(135deg,#1a2a6c,#b21f1f);
  color:#fff;
  padding:80px 20px;
  text-align:center;
}

/* FORM */
.form-box {
  max-width:600px;
  margin:40px auto;
  padding:20px;
  background:#fff;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ccc;
}

button {
  background:#a82323;
  color:#fff;
  padding:12px;
  border:none;
  width:100%;
  font-weight:bold;
  cursor:pointer;
}

#success { display:none; color:green; }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">SUSHANTA ROY</div>
  <div class="toggle" onclick="toggleMenu()">☰</div>
  <div class="menu" id="menu">
    <a href="#">Home</a>
    <a href="#">Practice</a>
    <a href="#contact">Contact</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Protecting Your Rights</h1>
  <p>Legal services in Dhaka Judge Court</p>
</div>

<!-- FORM -->
<div class="form-box" id="contact">
  <h2>Request Consultation</h2>

  <form id="form">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="tel" name="phone" placeholder="Phone" required>
    <input type="email" name="email" placeholder="Email" required>

    <select name="issue" required>
      <option value="">Select Issue</option>
      <option>Criminal</option>
      <option>Civil</option>
      <option>Family</option>
    </select>

    <textarea name="message" placeholder="Message" required></textarea>

    <button type="submit">Submit</button>
  </form>

  <p id="success">Message sent successfully!</p>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

document.getElementById("form").onsubmit = async function(e){
  e.preventDefault();

  let formData = new FormData(this);

  let res = await fetch("send.php", {
    method:"POST",
    body:formData
  });

  let text = await res.text();

  if(text === "OK"){
    document.getElementById("form").style.display="none";
    document.getElementById("success").style.display="block";
  } else {
    alert("Error sending message");
  }
}
</script>

</body>
</html>
